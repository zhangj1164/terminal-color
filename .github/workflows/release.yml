name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Verify Zig version
        run: zig version

      - name: Build project
        run: |
          Write-Host "Building project with Zig..."
          zig build
          Write-Host "Build completed. Checking output..."
          if (Test-Path "zig-out\bin\terminal-bg.exe") {
            Write-Host "Executable found: zig-out\bin\terminal-bg.exe"
            Get-Item "zig-out\bin\terminal-bg.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "ERROR: Executable not found!"
            Write-Host "Listing zig-out directory contents:"
            Get-ChildItem -Path zig-out -Recurse
            exit 1
          }

      - name: Create package
        shell: powershell
        run: |
          Write-Host "Creating package..."
          New-Item -ItemType Directory -Force -Path package
          Copy-Item zig-out\bin\terminal-bg.exe package\

          Write-Host "Copying documentation..."
          Copy-Item README.md package\README.md
          Copy-Item README_CN.md package\README_CN.md

          Write-Host "Creating USAGE.txt..."
          Set-Content -Path package\USAGE.txt -Value "Terminal Background Color Tool"
          Add-Content -Path package\USAGE.txt -Value "=============================="
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "A cross-platform CLI tool for getting and setting terminal background colors."
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "USAGE:"
          Add-Content -Path package\USAGE.txt -Value "    terminal-bg.exe <command> [options]"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "COMMANDS:"
          Add-Content -Path package\USAGE.txt -Value "    list                List all available colors"
          Add-Content -Path package\USAGE.txt -Value "    get                 Get current background color (shows warning)"
          Add-Content -Path package\USAGE.txt -Value "    set <color>         Set background color and clear screen"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "COLORS:"
          Add-Content -Path package\USAGE.txt -Value "    Standard: black, red, green, yellow, blue, magenta, cyan, white"
          Add-Content -Path package\USAGE.txt -Value "    Bright:   bright-black, bright-red, bright-green, bright-yellow,"
          Add-Content -Path package\USAGE.txt -Value "              bright-blue, bright-magenta, bright-cyan, bright-white"
          Add-Content -Path package\USAGE.txt -Value "    Special:  default (reset to terminal default)"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "EXAMPLES:"
          Add-Content -Path package\USAGE.txt -Value "    terminal-bg.exe list"
          Add-Content -Path package\USAGE.txt -Value "    terminal-bg.exe set blue"
          Add-Content -Path package\USAGE.txt -Value "    terminal-bg.exe set bright-cyan"
          Add-Content -Path package\USAGE.txt -Value "    terminal-bg.exe set default"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "REQUIREMENTS:"
          Add-Content -Path package\USAGE.txt -Value "    - Windows 10+ with modern terminal (Windows Terminal, PowerShell, CMD)"
          Add-Content -Path package\USAGE.txt -Value "    - ANSI escape sequence support"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "For more information, see README.md (English) or README_CN.md (Chinese)."

          Write-Host "Creating archive..."
          $version = $env:GITHUB_REF -replace 'refs/tags/', ''
          $archiveName = "terminal-bg-${version}-windows-x64.zip"
          Compress-Archive -Path package\* -DestinationPath $archiveName -Force

          Write-Host "Package created: $archiveName"
          Get-Item $archiveName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bg-windows
          path: terminal-bg-*-windows-x64.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: terminal-bg-windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: terminal-bg-*-windows-x64.zip
          body: |
            ## Terminal Background Color Tool

            A cross-platform CLI tool for setting terminal background colors using ANSI escape sequences.

            ### Features
            - 17 color options (8 standard + 8 bright + default)
            - Works on Windows 10+ and Unix-like systems
            - Zig 0.16 compatible

            ### Installation
            Download and extract the zip file, then run:
            ```bash
            terminal-bg.exe set blue
            ```

            ### Usage
            ```bash
            terminal-bg.exe list      # List all colors
            terminal-bg.exe set blue  # Set background color
            terminal-bg.exe set default  # Reset to default
            ```

            See included README.md and USAGE.txt for detailed instructions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}