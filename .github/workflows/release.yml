name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Package
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            executable: terminal-bg.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            executable: terminal-bg
          - os: macos-latest
            platform: macos
            arch: x64
            executable: terminal-bg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Verify Zig version
        run: zig version

      - name: Build project
        run: |
          echo "Building project with Zig..."
          zig build
          echo "Build completed. Checking output..."

          if [ -f "zig-out/bin/${{ matrix.executable }}" ]; then
            echo "Executable found: zig-out/bin/${{ matrix.executable }}"
            ls -lh zig-out/bin/${{ matrix.executable }}
          else
            echo "ERROR: Executable not found!"
            echo "Listing zig-out directory contents:"
            find zig-out -type f
            exit 1
          fi
        shell: bash

      - name: Create package (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          Write-Host "Creating Windows package..."
          New-Item -ItemType Directory -Force -Path package
          Copy-Item zig-out\bin\terminal-bg.exe package\

          Write-Host "Copying documentation..."
          Copy-Item README.md package\README.md
          Copy-Item README_CN.md package\README_CN.md

          Write-Host "Creating USAGE.txt..."
          Set-Content -Path package\USAGE.txt -Value "Terminal Background Color Tool"
          Add-Content -Path package\USAGE.txt -Value "=============================="
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "USAGE: terminal-bg.exe <command> [options]"
          Add-Content -Path package\USAGE.txt -Value "Commands: list, get, set <color>"
          Add-Content -Path package\USAGE.txt -Value "Colors: black, red, green, yellow, blue, magenta, cyan, white"
          Add-Content -Path package\USAGE.txt -Value "         bright-* variants, default"
          Add-Content -Path package\USAGE.txt -Value ""
          Add-Content -Path package\USAGE.txt -Value "See README files for details."

          $version = $env:GITHUB_REF -replace 'refs/tags/', ''
          $archiveName = "terminal-bg-${version}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path package\* -DestinationPath $archiveName -Force

          Write-Host "Package created: $archiveName"
          Get-Item $archiveName

      - name: Create package (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          echo "Creating Unix package..."
          mkdir -p package
          cp zig-out/bin/terminal-bg package/

          echo "Copying documentation..."
          cp README.md package/README.md
          cp README_CN.md package/README_CN.md

          echo "Creating USAGE.txt..."
          echo "Terminal Background Color Tool" > package/USAGE.txt
          echo "==============================" >> package/USAGE.txt
          echo "" >> package/USAGE.txt
          echo "USAGE: terminal-bg <command> [options]" >> package/USAGE.txt
          echo "" >> package/USAGE.txt
          echo "Commands: list, get, set <color>" >> package/USAGE.txt
          echo "" >> package/USAGE.txt
          echo "Colors: black, red, green, yellow, blue, magenta, cyan, white" >> package/USAGE.txt
          echo "        bright-* variants, default" >> package/USAGE.txt
          echo "" >> package/USAGE.txt
          echo "See README files for details." >> package/USAGE.txt

          chmod +x package/terminal-bg

          version="${GITHUB_REF#refs/tags/}"
          archiveName="terminal-bg-${version}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"

          tar -czf $archiveName -C package .

          echo "Package created: $archiveName"
          ls -lh $archiveName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bg-${{ matrix.platform }}
          path: |
            terminal-bg-*.zip
            terminal-bg-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Artifacts downloaded:"
          find artifacts -type f -name "*.zip" -o -name "*.tar.gz"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/terminal-bg-windows/*.zip
            artifacts/terminal-bg-linux/*.tar.gz
            artifacts/terminal-bg-macos/*.tar.gz
          body: |
            ## Terminal Background Color Tool v${{ github.ref_name }}

            Cross-platform CLI tool for setting terminal background colors using ANSI escape sequences.

            **Platforms:**
            - Windows x64 (ZIP archive with executable)
            - Linux x64 (tar.gz archive with executable)
            - macOS x64 (tar.gz archive with executable)

            **Features:**
            - 17 colors (8 standard + 8 bright + default)
            - Works on modern terminals with ANSI support
            - Zig 0.16 compatible

            **Quick Start:**

            Windows:
            ```cmd
            terminal-bg.exe list
            terminal-bg.exe set blue
            terminal-bg.exe set default
            ```

            Linux/macOS:
            ```bash
            chmod +x terminal-bg
            ./terminal-bg list
            ./terminal-bg set blue
            ./terminal-bg set default
            ```

            See included README.md (English) and README_CN.md (Chinese) for detailed usage.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}